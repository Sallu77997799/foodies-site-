<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Foodies</title>
    <meta name="description" content="Contact Foodies for orders and queries.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Foodies.</a>
        <nav>
            <ul id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="deals.html">Deals</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-header">
        <h1>Get in Touch</h1>
        <p style="color: var(--text-muted); margin-top: 10px;">We'd love to hear from you!</p>
    </div>

    <section class="contact-section">
        <div class="contact-image-container">
            <img src="images/contact-photo.jpeg" alt="Contact Us">
        </div>

        <div class="contact-form-container">
            <div class="form-container">
                <form onsubmit="submitContact(event)">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="message">Message / Order Details</label>
                        <textarea id="message" class="form-control" rows="5" required placeholder="Type your message here..."></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Foodies. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
